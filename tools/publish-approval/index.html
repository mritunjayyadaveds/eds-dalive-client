<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish Approval Dashboard</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; }
    .header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header strong { font-size: 16px; }
    .header span { font-size: 14px; color: #6b7280; }
    #dashboard { padding: 24px; }
    .loading { text-align: center; padding: 40px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    <strong>Publish Approval</strong>
    <span>— eds-dalive-client</span>
  </div>
  <div id="dashboard">
    <p class="loading">Loading approval queue...</p>
  </div>
  <script type="module">
    import { initDashboard } from './publish-approval.js';
    initDashboard(document.getElementById('dashboard'));
  </script>
</body>
</html>
